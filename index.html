<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
    font-family:'Pacifico', cursive;
    background:linear-gradient(135deg,#ffb6c1,#ffd6e7);
}

/* ================= SAKURA ================= */

.lily{
    position:absolute;
    top:-50px;
    font-size:30px;
    opacity:0.8;
    animation:jatuh linear infinite;
    z-index:1;
}

@keyframes jatuh{

0%{
    transform:
    translateY(-100px)
    rotate(0deg);
}

100%{
    transform:
    translateY(120vh)
    rotate(360deg);
}

}

/* ================= BOX ================= */

.box{
    width:320px;
    background:rgba(255,255,255,0.92);
    padding:40px;
    border-radius:30px;
    text-align:center;
    z-index:10;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    color:#ff4f81;
    margin-bottom:20px;
    font-size:32px;
}

input{
    width:90%;
    padding:12px;
    border:none;
    border-radius:15px;
    background:#f5f5f5;
    margin-bottom:20px;
    outline:none;
    font-size:16px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:20px;
    background:#ff4f81;
    color:white;
    cursor:pointer;
    font-size:18px;
    transition:0.3s;
    font-family:'Pacifico', cursive;
}

button:hover{
    transform:scale(1.08);
    background:#ff2e68;
}

.teks{
    margin-top:15px;
    color:#777;
}

/* ================= TRANSISI ================= */

.transisi2{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;

    background:
    linear-gradient(-45deg,
    #ffb6c1,
    #ff8fb1,
    #ffd6e7,
    #ff69b4);

    background-size:400% 400%;
    animation:bgGerak 8s ease infinite;

    overflow:hidden;

    opacity:0;
    visibility:hidden;

    transition:1s;
    z-index:9999;
}

.transisi2.show{
    opacity:1;
    visibility:visible;
}

@keyframes bgGerak{

0%{
    background-position:0% 50%;
}

50%{
    background-position:100% 50%;
}

100%{
    background-position:0% 50%;
}

}

/* ================= FOTO KECIL ================= */

.foto{
    position:absolute;

    width:95px;
    height:95px;

    object-fit:cover;

    border:none;
    border-radius:0;

    opacity:0;

    transform:
    scale(0)
    rotate(720deg);

    animation:munculAcak 2s forwards;
}

@keyframes munculAcak{

0%{
    opacity:0;

    transform:
    scale(0)
    rotate(720deg);
}

100%{
    opacity:1;

    transform:
    scale(1)
    rotate(0deg);
}

}

/* ================= FOTO TENGAH ================= */

.foto-tengah{
    position:absolute;

    width:320px;
    height:320px;

    object-fit:cover;

    border-radius:35px;

    border:6px solid white;

    top:50%;
    left:50%;

    transform:
    translate(-50%,-50%)
    scale(0);

    opacity:0;

    transition:1s;

    z-index:99999;

    animation:detak 1.5s infinite;

    box-shadow:
    0 0 40px white,
    0 0 80px pink;
}

.transisi2.show .foto-tengah{

    transform:
    translate(-50%,-50%)
    scale(1);

    opacity:1;

}

@keyframes detak{

0%{
    transform:
    translate(-50%,-50%)
    scale(1);
}

50%{
    transform:
    translate(-50%,-50%)
    scale(1.05);
}

100%{
    transform:
    translate(-50%,-50%)
    scale(1);
}

}

/* ================= SPARKLE ================= */

.sparkle{
    position:absolute;
    font-size:45px;
    z-index:999999;

    animation:
    kelapKelip 2s infinite,
    muter 6s linear infinite;
}

.s1{top:10%; left:15%;}
.s2{top:20%; left:80%;}
.s3{top:40%; left:10%;}
.s4{top:65%; left:85%;}
.s5{top:80%; left:20%;}
.s6{top:50%; left:75%;}

@keyframes kelapKelip{

0%{
    opacity:0;
    transform:scale(0.5);
}

50%{
    opacity:1;
    transform:scale(1.3);
}

100%{
    opacity:0;
    transform:scale(0.5);
}

}

@keyframes muter{

from{
    rotate:0deg;
}

to{
    rotate:360deg;
}

}

</style>
</head>
