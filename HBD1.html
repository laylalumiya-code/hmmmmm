<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>habede</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffb6c1,#ffd6e7,#fff0f5);
    font-family:'Pacifico',cursive;
    position:relative;
}

/* BACKGROUND */
.blur{
    position:absolute;
    width:400px;
    height:400px;
    background:rgba(255,255,255,.25);
    border-radius:50%;
    filter:blur(100px);
}

.blur1{
    top:-120px;
    left:-120px;
}

.blur2{
    bottom:-120px;
    right:-120px;
}

/* LOVE ANIMATION */
.love{
    position:absolute;
    bottom:-50px;
    font-size:25px;
    opacity:.7;
    animation:loveNaik linear infinite;
}

@keyframes loveNaik{
    0%{
        transform:translateY(0) scale(.5);
        opacity:0;
    }
    50%{
        opacity:1;
    }
    100%{
        transform:translateY(-120vh) scale(1.5);
        opacity:0;
    }
}

/* CONTAINER */
.container{
    width:92%;
    max-width:1250px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:40px;
    z-index:10;
}

/* ================= TEXT ================= */

.text-area{
    width:42%;
    text-align:center;
}

/* JUDUL + FOTO KECIL */
.judul-box{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    margin-bottom:20px;
}

.foto-hias{
    width:80px;
    height:110px;
    object-fit:cover;
    border-radius:14px;
    box-shadow:0 0 15px rgba(255,255,255,.8);
    animation:naikTurun 3s ease-in-out infinite;
}

@keyframes naikTurun{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-10px);
    }
}

.text-area h1{
    font-size:70px;
    line-height:1;
    color:#ff4f81;
    text-shadow:0 0 15px white;
}

.dekorasi{
    font-size:28px;
    margin-top:15px;
    letter-spacing:8px;
}

.text-area p{
    margin-top:25px;
    font-size:24px;
    line-height:1.9;
    color:#8b2d55;
}

/* ================= FOTO BESAR ================= */

.foto-area{
    width:58%;
    height:600px;
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
}

.foto-besar{
    width:290px;
    height:390px;
    object-fit:cover;
    border-radius:20px;
    z-index:5;
    box-shadow:
    0 0 25px rgba(255,255,255,.8),
    0 0 35px rgba(255,105,180,.5);
}

/* FOTO KECIL MELINGKAR */
.foto-kecil{
    position:absolute;
    width:70px;
    height:95px;
    object-fit:cover;
    border-radius:14px;
    box-shadow:0 0 12px rgba(255,255,255,.7);
}

/* POSISI RAPI */

/* atas */
.f1{
    top:20px;
    left:50%;
    transform:translateX(-50%);
}

/* kanan atas */
.f2{
    top:55px;
    right:155px;
}

.f3{
    top:145px;
    right:55px;
}

/* kanan */
.f4{
    top:50%;
    right:20px;
    transform:translateY(-50%);
}

/* kanan bawah */
.f5{
    bottom:145px;
    right:55px;
}

.f6{
    bottom:55px;
    right:155px;
}

/* bawah */
.f7{
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
}

/* kiri bawah */
.f8{
    bottom:55px;
    left:155px;
}

.f9{
    bottom:145px;
    left:55px;
}

/* kiri */
.f10{
    top:50%;
    left:20px;
    transform:translateY(-50%);
}

/* kiri atas */
.f11{
    top:145px;
    left:55px;
}

.f12{
    top:55px;
    left:155px;
}

/* RESPONSIVE */
@media(max-width:900px){

    body{
        overflow:auto;
        padding:40px 0;
    }

    .container{
        flex-direction:column-reverse;
    }

    .text-area,
    .foto-area{
        width:100%;
    }

    .text-area h1{
        font-size:52px;
    }

    .text-area p{
        font-size:20px;
    }

    .foto-area{
        height:500px;
    }

    .foto-besar{
        width:220px;
        height:300px;
    }

    .foto-kecil{
        width:55px;
        height:75px;
    }

    .foto-hias{
        width:60px;
        height:80px;
    }
}
</style>
</head>
<body>

<div class="blur blur1"></div>
<div class="blur blur2"></div>

<div class="love" style="left:10%;animation-duration:8s;">💖</div>
<div class="love" style="left:35%;animation-duration:10s;">💕</div>

<div class="container">

    <!-- BAGIAN UCAPAN -->
    <div class="text-area">

        <div class="judul-box">

            <img src="h.png" class="foto-hias">

            <div>
                <h1>

                </h1>

                <div class="dekorasi">
                    🌸 ✨ 💖 ✨ 🌸
                </div>
            </div>

            <img src="n (1).png" class="foto-hias">

        <p>
            selamat ulang tahun <br>

            dan semoga hal baik menyertaimu
        </p>

        <div class="dekorasi">

        </div>

    </div>

    <!-- BAGIAN FOTO -->
    <div class="foto-area">

        <img src="tyas 2.jpg" class="foto-besar">

        <img src="C.png" class="foto-kecil f1">
        <img src="f2.png" class="foto-kecil f2">
        <img src="f3.png" class="foto-kecil f3">
        <img src="lily.png" class="foto-kecil f4">
        <img src="seallion.png" class="foto-kecil f5">
        <img src="f5.png" class="foto-kecil f6">
        <img src="f6.png" class="foto-kecil f7">
        <img src="f7.png" class="foto-kecil f8">
        <img src="fluter.png" class="foto-kecil f9">
        <img src="lily.png" class="foto-kecil f10">
        <img src="f4.png" class="foto-kecil f11">
        <img src="foto1.png" class="foto-kecil f12">

    </div>

</div>

</body>
</html>
